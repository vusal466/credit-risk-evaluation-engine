# Server Configuration
server:
  port: 8081

# Spring Application
spring:
  application:
    name: loan-risk-evaluation-system

  amqp:
    deserialization:
      trust-all: true

  jpa:
    hibernate:
      ddl-auto: update

  # Database Configuration
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  # JPA Configuration


  # RabbitMQ Configuration
  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
    virtual-host: /
    listener:
      simple:
        auto-startup: true
        concurrency: 5
        max-concurrency: 10

# Custom RabbitMQ Properties
rabbitmq:
  exchange:
    loan: loan.exchange
  queue:
    evaluation: risk.evaluation.queue
    result: risk.result.queue
  routing-key:
    evaluation: loan.evaluation
    result: loan.result

# Logging
logging:
  level:
    root: INFO
    com.example.loanriskevaluationsystem: DEBUG
    org.springframework.amqp: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# SpringDoc OpenAPI
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    filter: true
    try-it-out-enabled: true

# Management / Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Custom API info
api:
  title: Loan Risk Evaluation System
  version: 1.0.0
  description: API documentation for loan and risk evaluation services